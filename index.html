<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莫古莫古大收集集集</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "Microsoft JhengHei", sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 750px;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        .clear-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .clear-btn:hover { background-color: #dc2626; }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            color: #475569;
            font-size: 14px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }
        .checklist {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            max-height: 60vh;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }
        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid #edf2f7;
            transition: background-color 0.2s;
        }
        .item-row:last-child { border-bottom: none; }
        .item-row:hover { background-color: #f8fafc; }
        
        /* 當右側「隱藏」被勾選時的樣式 */
        .item-row.hidden-item {
            background-color: #f8fafc;
            opacity: 0.35;
        }
        .item-row.hidden-item .left-part {
            pointer-events: none; /* 隱藏時無法點擊左側勾選計算 */
        }
        .item-row.hidden-item .num-input {
            background-color: #e2e8f0;
            pointer-events: none;
        }

        .left-part {
            display: flex;
            align-items: center;
            flex: 2;
            cursor: pointer;
            min-width: 0;
        }
        .left-part input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .item-name {
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .right-part {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }
        .input-group {
            display: flex;
            align-items: center;
        }
        .num-input {
            width: 70px;
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            text-align: right;
            font-size: 14px;
        }
        
        /* 右側隱藏控制框自訂樣式 */
        .hide-control-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .hide-control-label:hover {
            background-color: #e2e8f0;
        }
        .hide-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .item-row.checked { background-color: #f0fdf4; }
        /* 💡 這裡已經幫你把 text-decoration: line-through 移除了！ 勾選時字體不會再有刪除線 */
        .item-row.checked .item-name { color: #166534; }
        
        .total-section {
            background: #2563eb;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }
        .total-amount { font-size: 26px; }
        .header-item-name { flex: 2; }
        .header-item-controls { display: flex; gap: 40px; padding-right: 15px; flex-shrink: 0; }
        .header-hide-txt { width: 45px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h1 id="mainTitle">莫古莫古大收集-我要肝多少?</h1>
    
    <div class="action-bar">
        <button class="clear-btn" onclick="resetToDefault()">🔄 完全重設</button>
    </div>

    <div class="table-header">
        <span class="header-item-name">兌換道具</span>
        <div class="header-item-controls">
            <span>兌換所需數</span>
            <span>購買數量</span>
            <span class="header-hide-txt">完成</span>
        </div>
    </div>

    <ul class="checklist" id="checklist">
        </ul>

    <div class="total-section">
        <span>還需要：</span>
        <div>
            <span class="total-amount" id="totalAmount">0</span>
            <span>稀少神典石</span>
        </div>
    </div>
</div>

<script>
    // 56 項完全體正確資料
    const defaultData = [
        {name: "猴面雀耳墜", val: 100}, {name: "火神夾克衫", val: 50}, {name: "暗影玲龍魔笛", val: 50},
        {name: "飛隼號啟動鑰匙", val: 50}, {name: "魔法飛床", val: 50}, {name: "天佑裝甲", val: 50},
        {name: "小小古代人", val: 50}, {name: "管弦樂琴樂譜：原始的墮天使", val: 50}, {name: "髮型樣式：髮箍式編髮", val: 30},
        {name: "趣味圓點陽傘", val: 30}, {name: "演技教材‧背靠", val: 30}, {name: "金碟幣白金卡", val: 30},
        {name: "水龍蜥角笛", val: 30}, {name: "炸彈角笛", val: 30}, {name: "夢幻神威魔笛", val: 30},
        {name: "青君神威魔笛", val: 30}, {name: "森林舊椅子", val: 20}, {name: "配藥工作臺", val: 20},
        {name: "花樣蠟燭套裝", val: 20}, {name: "貓小胖地毯", val: 20}, {name: "鬆軟鬆餅套餐", val: 20},
        {name: "風精靈娃娃", val: 15}, {name: "斯卡拉禦敵長衣", val: 15}, {name: "斯卡拉禦敵軟甲褲", val: 15},
        {name: "斯卡拉制敵長衣", val: 15}, {name: "斯卡拉制敵軟甲褲", val: 15}, {name: "斯卡拉強襲長衣", val: 15},
        {name: "斯卡拉強襲下身", val: 15}, {name: "斯卡拉游擊短衣", val: 15}, {name: "斯卡拉游擊垮褲", val: 15},
        {name: "斯卡拉精準長衣", val: 15}, {name: "斯卡拉精準下身", val: 15}, {name: "斯卡拉詠咒長袍", val: 15},
        {name: "斯卡拉詠咒垮褲", val: 15}, {name: "斯卡拉治癒短衣", val: 15}, {name: "斯卡拉治癒下身", val: 15},
        {name: "陳舊的地圖S1", val: 15}, {name: "陳舊的地圖S2", val: 15}, {name: "陳舊的地圖S3", val: 15},
        {name: "陳舊的地圖S4", val: 15}, {name: "德拉瓦尼亞雲海詳細地圖", val: 10}, {name: "阿巴拉提亞雲海詳細地圖", val: 10},
        {name: "魔大陸阿濟茲拉詳細地圖", val: 10}, {name: "紅玉海詳細地圖", val: 10}, {name: "延夏詳細地圖", val: 10},
        {name: "太陽神草原詳細地圖", val: 10}, {name: "九宮幻卡：智蛙", val: 10}, {name: "九宮幻卡：奧諾魯瓦", val: 10},
        {name: "九宮幻卡：漆黑導師", val: 7}, {name: "九宮幻卡：光之戰士（漆黑）", val: 7}, {name: "九宮幻卡：伊甸之約", val: 7},
        {name: "小鴨嘴獸", val: 7}, {name: "豬小仙", val: 7}, {name: "管弦樂琴樂譜：夢園之門", val: 7}, 
	{name: "克里耶蘿蔔 ×5", val: 5}, {name: "魔法棱晶（職業大師）×5", val: 1}
    ];

    document.addEventListener("DOMContentLoaded", () => {
        initWebData();
    });

    function initWebData() {
        const savedData = localStorage.getItem('mogchecklistv0.02');
        const checklistUl = document.getElementById('checklist');
        checklistUl.innerHTML = '';

        let listToRender = [];
        if (savedData) {
            listToRender = JSON.parse(savedData);
        } else {
            listToRender = defaultData.map((item, idx) => ({
                id: 'item_' + idx,
                name: item.name,
                price: item.val,
                count: 1,
                isChecked: false,
                isHidden: false
            }));
            localStorage.setItem('mogchecklistv0.02', JSON.stringify(listToRender));
        }

        listToRender.forEach(item => {
            renderItemRow(item);
        });
        calculateTotal();
    }

    function renderItemRow(item) {
        const checklistUl = document.getElementById('checklist');
        const li = document.createElement('li');
        
        let rowClass = 'item-row';
        if (item.isChecked) rowClass += ' checked';
        if (item.isHidden) rowClass += ' hidden-item';
        
        li.className = rowClass;
        li.setAttribute('data-id', item.id);

        li.innerHTML = `
            <label class="left-part">
                <input type="checkbox" class="item-checkbox" ${item.isChecked ? 'checked' : ''} onchange="handleRowChange(this)">
                <span class="item-name" title="${item.name}">${item.name}</span>
            </label>
            <div class="right-part">
                <div class="input-group"><input type="number" class="num-input price-input" value="${item.price}" min="0" oninput="saveAndCalculate()"></div>
                <div class="input-group"><input type="number" class="num-input count-input" value="${item.count}" min="1" oninput="saveAndCalculate()"></div>
                <label class="hide-control-label" title="${item.isHidden ? '按錯了，還沒集完' : '達成請打勾（總數扣除）'}">
                    <input type="checkbox" class="hide-checkbox" ${item.isHidden ? 'checked' : ''} onchange="toggleHide(this)">
                </label>
            </div>
        `;
        checklistUl.appendChild(li);
    }

    function handleRowChange(checkbox) {
        const row = checkbox.closest('.item-row');
        if (checkbox.checked) {
            row.classList.add('checked');
        } else {
            row.classList.remove('checked');
        }
        saveAndCalculate();
    }

    function toggleHide(checkbox) {
        const row = checkbox.closest('.item-row');
        const label = checkbox.closest('.hide-control-label');
        
        if (checkbox.checked) {
            row.classList.add('hidden-item');
            label.title = '按錯了，還沒集完';
        } else {
            row.classList.remove('hidden-item');
            label.title = '達成請打勾（總數扣除）';
        }
        saveAndCalculate();
    }

    function saveAndCalculate() {
        const rows = document.querySelectorAll('.item-row');
        const currentList = [];

        rows.forEach(row => {
            const id = row.getAttribute('data-id');
            const name = row.querySelector('.item-name').innerText;
            const isChecked = row.querySelector('.item-checkbox').checked;
            const price = parseFloat(row.querySelector('.price-input').value) || 0;
            const count = parseFloat(row.querySelector('.count-input').value) || 0;
            const isHidden = row.querySelector('.hide-checkbox').checked;

            currentList.push({ id, name, price, count, isChecked, isHidden });
        });

        localStorage.setItem('mogchecklistv0.02', JSON.stringify(currentList));
        calculateTotal();
    }

    function calculateTotal() {
        let total = 0;
        const rows = document.querySelectorAll('.item-row');

        rows.forEach(row => {
            const isChecked = row.querySelector('.item-checkbox').checked;
            const isHidden = row.querySelector('.hide-checkbox').checked;
            const price = parseFloat(row.querySelector('.price-input').value) || 0;
            const count = parseFloat(row.querySelector('.count-input').value) || 0;

            if (!isHidden && isChecked) {
                total += (price * count);
            }
        });
        document.getElementById('totalAmount').innerText = total.toLocaleString();
    }

    function resetToDefault() {
        if (confirm("確定要重設網頁，清除所有的勾選與隱藏狀態嗎？")) {
            localStorage.removeItem('mogchecklistv0.02');
            initWebData();
        }
    }
</script>

</body>
</html>
