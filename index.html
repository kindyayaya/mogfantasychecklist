<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>莫古莫古大收集集集</title>
    <style>
        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "Microsoft JhengHei", sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 750px;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: #0f172a;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 15px;
        }
        .clear-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .clear-btn:hover { background-color: #dc2626; }

        .table-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8fafc;
            padding: 10px 15px;
            border-radius: 6px;
            font-weight: bold;
            color: #475569;
            font-size: 14px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
        }
        .checklist {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
            max-height: 60vh;
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }
        .item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            border-bottom: 1px solid #edf2f7;
            transition: background-color 0.2s;
        }
        .item-row:last-child { border-bottom: none; }
        .item-row:hover { background-color: #f8fafc; }
        
        .item-row.hidden-item {
            background-color: #f8fafc;
            opacity: 0.35;
        }
        .item-row.hidden-item .left-part {
            pointer-events: none;
        }
        .item-row.hidden-item .num-input {
            background-color: transparent !important;
            pointer-events: none;
        }

        .left-part {
            display: flex;
            align-items: center;
            flex: 2;
            cursor: pointer;
            min-width: 0;
        }
        .left-part input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .item-name-wrapper {
            display: inline-flex;
            align-items: center;
            min-width: 0;
            flex: 1;
        }
        .item-name {
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #global-tooltip {
            display: none;
            position: fixed;
            z-index: 9999;
            width: max-content;
            max-width: 220px;
            background-color: rgba(15, 23, 42, 0.95);
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
            font-weight: normal;
            line-height: 1.4;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
            pointer-events: none;
        }

        .right-part {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-shrink: 0;
        }
        .input-group {
            display: flex;
            align-items: center;
        }
        .num-input {
            width: 70px;
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            text-align: right;
            font-size: 14px;
        }
        
        /* 💡 核心修改一：調整金額呈現與「置中對齊」 */
        .price-input[readonly] {
            width: 80px;                   /* 固定寬度，與上方標頭字寬貼合 */
            background-color: transparent; 
            color: #1e293b;                
            border: none;                  
            cursor: default;               
            font-weight: 500;              
            text-align: center;            /* 讓金額數字「置中對齊」 */
            padding: 6px 0;
        }
        /* 隱藏數字輸入框內建的上下調整箭頭 */
        .price-input::-webkit-outer-spin-button,
        .price-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .price-input[type=number] {
            -moz-appearance: textfield;
        }

        .item-row.checked .price-input {
            color: #166534;
        }
        
        .hide-control-label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .hide-control-label:hover {
            background-color: #e2e8f0;
        }
        .hide-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .item-row.checked { background-color: #f0fdf4; }
        .item-row.checked .item-name { color: #166534; }
        
        .total-section {
            background: #2563eb;
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }
        .total-amount { font-size: 26px; }
        
        /* 💡 核心修改二：微調標頭與內容欄位的欄寬分配，達成完美對齊 */
        .header-item-name { flex: 2; }
        .header-item-controls { display: flex; gap: 15px; padding-right: 0px; flex-shrink: 0; align-items: center; }
        .header-price-txt { width: 80px; text-align: center; } /* 標頭文字也固定 80px 且置中 */
        .header-count-txt { width: 84px; text-align: center; } /* 購買數量標頭對齊 */
        .header-hide-txt { width: 45px; text-align: center; }
    </style>
</head>
<body>

    <h1 id="mainTitle">莫古莫古大收集-我要肝多少?</h1>
    <div class="subtitle">資料來源：FFXIV官網、灰基</div>
    <div class="subtitle">可能有地圖名稱、後期副本與腳色名稱雷</div>
    <div class="action-bar">
        <button class="clear-btn" onclick="resetToDefault()">🔄 完全重設</button>
    </div>

    <div class="table-header">
        <span class="header-item-name">兌換道具</span>
        <div class="header-item-controls">
            <span class="header-price-txt">神典石</span>
            <span class="header-count-txt">兌換數</span>
            <span class="header-hide-txt">完成</span>
        </div>
    </div>

    <ul class="checklist" id="checklist">
    </ul>

    <div class="total-section">
        <span>還需要：</span>
        <div>
            <span class="total-amount" id="totalAmount">0</span>
            <span>稀少神典石</span>
        </div>
    </div>
</div>

<div id="global-tooltip"></div>

        {name: "陳舊的地圖S4", val: 15, desc: "90等 8人 必出紋 可堆疊"}, 
        {name: "德拉瓦尼亞雲海詳細地圖", val: 10, desc: "3/4版狩獵 兵團徽章250"}, 
	{name: "阿巴拉提亞雲海詳細地圖", val: 10, desc: "3/4版狩獵 兵團徽章250"},

        {name: "太陽神草原詳細地圖", val: 10, desc: "3/4版狩獵 兵團徽章250"}, 
	{name: "九宮幻卡：智蛙", val: 10, desc: "3版田園郡 (x6.7 y7.4) 對戰取得，要先打完啟動之章"}, 
	{name: "九宮幻卡：奧諾魯瓦", val: 10, desc: "3版福爾唐家的管家對戰取得"},
        {name: "九宮幻卡：漆黑導師", val: 7, desc: "80等副本 漆黑宮殿宇宙宮"}, 
	{name: "九宮幻卡：光之戰士（漆黑）", val: 7, desc: "80等殲滅 普通/幻 光之戰士"}, 
	{name: "九宮幻卡：伊甸之約", val: 7, desc: "5版大型任務 普通/零式 再生4"}, 
        {name: "小鴨嘴獸", val: 7, desc: "5版狩獵 戰利品250"}, 
	{name: "豬小仙", val: 7, desc: "園藝雇員森林25，6版深層迷宮正統優雷卡"}, 
	{name: "管弦樂琴樂譜：夢園之門", val: 7, desc: "5版仙子友好部族血誓 8個代幣兌換"}, 
        {name: "克里耶蘿蔔 ×5", val: 5}, 
	{name: "魔法棱晶（職業大師）×5", val: 1}
    ];

    document.addEventListener("DOMContentLoaded", () => {
        initWebData();
        setupTooltipEvents();
    });

    function initWebData() {
        // 💡 換成 v15 金鑰
        const savedData = localStorage.getItem('mogchecklistv0.45');
        const checklistUl = document.getElementById('checklist');
        checklistUl.innerHTML = '';

        let listToRender = [];
        if (savedData) {
            listToRender = JSON.parse(savedData);
        } else {
            listToRender = defaultData.map((item, idx) => ({
                id: 'item_' + idx,
                name: item.name,
                price: item.val,
                count: 1,
                desc: item.desc || item.name,
                isChecked: false,
                isHidden: false
            }));
            localStorage.setItem('mogchecklistv0.45', JSON.stringify(listToRender));
        }

        listToRender.forEach(item => {
            renderItemRow(item);
        });
        calculateTotal();
    }

    function renderItemRow(item) {
        const checklistUl = document.getElementById('checklist');
        const li = document.createElement('li');
        
        let rowClass = 'item-row';
        if (item.isChecked) rowClass += ' checked';
        if (item.isHidden) rowClass += ' hidden-item';
        
        li.className = rowClass;
        li.setAttribute('data-id', item.id);

        li.innerHTML = `
            <label class="left-part">
                <input type="checkbox" class="item-checkbox" ${item.isChecked ? 'checked' : ''} onchange="handleRowChange(this)">
                <div class="item-name-wrapper" data-tooltip="${item.desc}">
                    <span class="item-name">${item.name}</span>
                </div>
            </label>
            <div class="right-part">
                <div class="input-group"><input type="number" class="num-input price-input" value="${item.price}" readonly></div>
                <div class="input-group"><input type="number" class="num-input count-input" value="${item.count}" min="1" oninput="saveAndCalculate()"></div>
                <label class="hide-control-label" title="${item.isHidden ? '按錯了，還沒集完' : '達成請打勾（總數扣除）'}">
                    <input type="checkbox" class="hide-checkbox" ${item.isHidden ? 'checked' : ''} onchange="toggleHide(this)">
                </label>
            </div>
        `;
        checklistUl.appendChild(li);
    }

    function setupTooltipEvents() {
        const tooltip = document.getElementById('global-tooltip');
        const checklist = document.getElementById('checklist');

        checklist.addEventListener('mouseover', (e) => {
            const wrapper = e.target.closest('.item-name-wrapper');
            if (wrapper) {
                const text = wrapper.getAttribute('data-tooltip');
                tooltip.innerText = text;
                tooltip.style.display = 'block';
            }
        });

        checklist.addEventListener('mousemove', (e) => {
            const wrapper = e.target.closest('.item-name-wrapper');
            if (wrapper) {
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
            }
        });

        checklist.addEventListener('mouseout', (e) => {
            const wrapper = e.target.closest('.item-name-wrapper');
            if (wrapper) {
                tooltip.style.none = tooltip.style.display = 'none';
            }
        });
    }

    function handleRowChange(checkbox) {
        const row = checkbox.closest('.item-row');
        if (checkbox.checked) {
            row.classList.add('checked');
        } else {
            row.classList.remove('checked');
        }
        saveAndCalculate();
    }

    function toggleHide(checkbox) {
        const row = checkbox.closest('.item-row');
        const label = checkbox.closest('.hide-control-label');
        
        if (checkbox.checked) {
            row.classList.add('hidden-item');
            label.title = '按錯了，還沒集完';
        } else {
            row.classList.remove('hidden-item');
            label.title = '達成請打勾（總數扣除）';
        }
        saveAndCalculate();
    }

    function saveAndCalculate() {
        const rows = document.querySelectorAll('.item-row');
        const currentList = [];

        rows.forEach(row => {
            const id = row.getAttribute('data-id');
            const name = row.querySelector('.item-name').innerText;
            const isChecked = row.querySelector('.item-checkbox').checked;
            const price = parseFloat(row.querySelector('.price-input').value) || 0;
            const count = parseFloat(row.querySelector('.count-input').value) || 0;
            const isHidden = row.querySelector('.hide-checkbox').checked;
            const desc = row.querySelector('.item-name-wrapper').getAttribute('data-tooltip');

            currentList.push({ id, name, price, count, isChecked, isHidden, desc });
        });

        localStorage.setItem('mogchecklistv0.45', JSON.stringify(currentList));
        calculateTotal();
    }

    function calculateTotal() {
        let total = 0;
        const rows = document.querySelectorAll('.item-row');

        rows.forEach(row => {
            const isChecked = row.querySelector('.item-checkbox').checked;
            const isHidden = row.querySelector('.hide-checkbox').checked;
            const price = parseFloat(row.querySelector('.price-input').value) || 0;
            const count = parseFloat(row.querySelector('.count-input').value) || 0;

            if (!isHidden && isChecked) {
                total += (price * count);
            }
        });
        document.getElementById('totalAmount').innerText = total.toLocaleString();
    }

    function resetToDefault() {
        if (confirm("確定要重設網頁，清除所有的勾選與隱藏狀態嗎？")) {
            localStorage.removeItem('mogchecklistv0.45');
            initWebData();
        }
    }
</script>

</body>
</html>
